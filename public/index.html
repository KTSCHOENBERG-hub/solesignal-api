<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolePing Pro Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f7;--card:#fff;--dark:#1a1a2e;--darker:#16162a;--accent:#6c5ce7;--green:#00b894;--red:#d63031;--orange:#fdcb6e;--text:#2d3436;--muted:#636e72;--border:#e0e0e0;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--dark);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar .logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo h1{font-size:18px;font-weight:700}
.sidebar .logo .badge{background:var(--accent);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.sidebar nav{padding:16px 0;flex:1}
.sidebar .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);padding:12px 20px 6px}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:.2s;font-size:14px}
.sidebar .nav-item:hover,.sidebar .nav-item.active{color:#fff;background:rgba(255,255,255,.08)}
.sidebar .nav-item svg{width:16px;height:16px;opacity:.7}
.sidebar .status{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;display:flex;align-items:center;gap:8px}
.sidebar .status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto}
.header{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card)}
.header h2{font-size:22px;font-weight:700}
.header .badges{display:flex;gap:8px;align-items:center}
.header .badge-live{background:#e8f8f5;color:var(--green);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.header .update-time{color:var(--muted);font-size:12px}
.search-bar{padding:16px 28px;background:var(--card);border-bottom:1px solid var(--border)}
.search-row{display:flex;gap:10px}
.search-row input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;transition:.2s}
.search-row input:focus{border-color:var(--accent)}
.search-row button{padding:12px 24px;background:var(--dark);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.search-row button:hover{background:var(--accent)}
.quick-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.quick-tags span{padding:5px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;transition:.2s}
.quick-tags span:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.content{padding:20px 28px;flex:1}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;border:1px solid var(--border)}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.stat-card .value{font-size:26px;font-weight:700}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:2px}
.stat-card .value.green{color:var(--green)}
.table-section{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-header h3{font-size:16px;font-weight:600}
.table-header .count{color:var(--muted);font-size:13px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);cursor:pointer;user-select:none}
.data-table th:hover{color:var(--text)}
.data-table td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
.data-table tr:hover{background:#f8f9fa;cursor:pointer}
.shoe-cell{display:flex;align-items:center;gap:12px;min-width:200px}
.shoe-img{width:48px;height:48px;border-radius:6px;object-fit:cover;background:#f0f0f0}
.shoe-name{font-weight:600;font-size:13px;line-height:1.3}
.shoe-meta{font-size:11px;color:var(--muted)}
.price{font-weight:600;font-family:'SF Mono',monospace,sans-serif}
.spread-pos{color:var(--green);font-weight:600}
.spread-neg{color:var(--red);font-weight:600}
.vol-badge{background:var(--bg);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--muted)}
.loading{text-align:center;padding:60px;color:var(--muted)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:40px;color:var(--red)}
/* Detail Panel */
.detail-overlay{position:fixed;top:0;right:-480px;width:480px;height:100%;background:var(--card);box-shadow:-4px 0 20px rgba(0,0,0,.15);z-index:100;transition:right .3s ease;overflow-y:auto}
.detail-overlay.open{right:0}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);z-index:2}
.detail-close:hover{color:var(--text)}
.detail-img{width:100%;height:260px;object-fit:contain;background:var(--bg);padding:30px}
.detail-body{padding:24px}
.detail-body h2{font-size:20px;font-weight:700;margin-bottom:4px}
.detail-body .meta{color:var(--muted);font-size:13px;margin-bottom:20px}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.price-box{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.price-box .plabel{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.price-box .pval{font-size:18px;font-weight:700;font-family:'SF Mono',monospace,sans-serif}
.price-box .pval.ask{color:var(--accent)}
.calc-section{background:var(--bg);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.calc-section h4{font-size:14px;font-weight:600;margin-bottom:12px}
.calc-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.calc-row label{font-size:12px;color:var(--muted);width:80px;flex-shrink:0}
.calc-row input,.calc-row select{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none}
.calc-row input:focus,.calc-row select:focus{border-color:var(--accent)}
.calc-results{margin-top:16px}
.calc-line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.calc-line.total{font-weight:700;font-size:15px;border-bottom:none;padding-top:10px}
.calc-line .profit-pos{color:var(--green);font-weight:700}
.calc-line .profit-neg{color:var(--red);font-weight:700}
.mp-compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.mp-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.mp-card .mp-name{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mp-card .mp-profit{font-size:16px;font-weight:700}
.mp-card .mp-roi{font-size:11px;color:var(--muted)}
.link-btn{display:inline-block;padding:10px 20px;background:var(--dark);color:#fff;border-radius:var(--radius);text-decoration:none;font-size:13px;font-weight:600;margin-top:16px;text-align:center;width:100%;transition:.2s}
.link-btn:hover{background:var(--accent)}
@media(max-width:900px){.sidebar{width:180px}.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.sidebar{display:none}.detail-overlay{width:100%}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <span style="font-size:20px">&#9679;</span>
    <h1>SolePing</h1>
    <span class="badge">PRO</span>
  </div>
  <nav>
    <div class="nav-label">Tools</div>
    <div class="nav-item active" onclick="showSection('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="showSection('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Search
    </div>
    <div class="nav-item" onclick="showSection('trending')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
      Trending
    </div>
    <div class="nav-label">Data</div>
    <div class="nav-item" onclick="showSection('compare')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Compare Prices
    </div>
  </nav>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
</div>

<div class="main">
  <div class="header">
    <div>
      <h2 id="page-title">Dashboard</h2>
    </div>
    <div class="badges">
      <span class="badge-live" id="source-badge">Live StockX Data</span>
      <span class="update-time" id="update-time"></span>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search any sneaker... Jordan 1, Yeezy 350, Dunk Low" onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">Search</button>
    </div>
    <div class="quick-tags">
      <span onclick="quickSearch('Jordan 1 High')">Jordan 1</span>
      <span onclick="quickSearch('Yeezy 350')">Yeezy 350</span>
      <span onclick="quickSearch('Dunk Low')">Dunk Low</span>
      <span onclick="quickSearch('New Balance 550')">NB 550</span>
      <span onclick="quickSearch('Air Force 1')">Air Force 1</span>
      <span onclick="quickSearch('Travis Scott')">Travis Scott</span>
      <span onclick="quickSearch('Nike SB Dunk')">Nike SB</span>
      <span onclick="quickSearch('Adidas Samba')">Samba</span>
    </div>
  </div>

  <div class="content">
    <div class="stats" id="stats-area"></div>
    <div id="table-area"></div>
    <div id="error-area"></div>
  </div>
</div>

<div class="detail-overlay" id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detail-content"></div>
</div>

<script>
const API = window.location.origin;
let currentData = [];
let sortCol = null;
let sortDir = 1;

// --- Init ---
async function init() {
  checkHealth();
  setInterval(checkHealth, 60000);
  await loadTrending();
  setInterval(loadTrending, 5 * 60 * 1000);
}

// --- Health Check ---
async function checkHealth() {
  try {
    const r = await fetch(API + "/api/health");
    const d = await r.json();
    if (d.status === "ok") {
      document.getElementById("status-dot").style.background = "#00b894";
      document.getElementById("status-text").textContent = "Live Data Active";
    }
  } catch(e) {
    document.getElementById("status-dot").style.background = "#d63031";
    document.getElementById("status-text").textContent = "Reconnecting...";
  }
}

// --- Load Trending ---
async function loadTrending() {
  document.getElementById("table-area").innerHTML = '<div class="loading"><div class="spinner"></div>Loading live market data...</div>';
  try {
    const r = await fetch(API + "/api/trending?limit=25");
    const d = await r.json();
    currentData = d.results || [];
    renderStats(currentData);
    renderTable(currentData, "Trending Sneakers");
    updateTime();
  } catch(e) {
    document.getElementById("table-area").innerHTML = '<div class="error-msg">Failed to load data. <a href="javascript:loadTrending()">Retry</a></div>';
  }
}

// --- Search ---
async function doSearch() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return loadTrending();
  document.getElementById("table-area").innerHTML = '<div class="loading"><div class="spinner"></div>Searching StockX...</div>';
  document.getElementById("page-title").textContent = "Search Results";
  try {
    const r = await fetch(API + "/api/search?q=" + encodeURIComponent(q) + "&limit=25");
    const d = await r.json();
    currentData = d.results || [];
    renderStats(currentData);
    renderTable(currentData, 'Results for "' + q + '"');
    updateTime();
  } catch(e) {
    document.getElementById("table-area").innerHTML = '<div class="error-msg">Search failed. <a href="javascript:doSearch()">Retry</a></div>';
  }
}

function quickSearch(q) {
  document.getElementById("search-input").value = q;
  doSearch();
}

function showSection(s) {
  document.querySelectorAll(".nav-item").forEach(function(el, i) { el.classList.remove("active"); });
  event.currentTarget.classList.add("active");
  if (s === "dashboard" || s === "trending") {
    document.getElementById("page-title").textContent = "Dashboard";
    document.getElementById("search-input").value = "";
    loadTrending();
  }
}

// --- Render Stats ---
function renderStats(items) {
  const withPrice = items.filter(function(s) { return s.lowestAsk; });
  const count = items.length;
  const avgAsk = withPrice.length > 0 ? Math.round(withPrice.reduce(function(a, s) { return a + s.lowestAsk; }, 0) / withPrice.length) : 0;
  const bestSpread = items.reduce(function(best, s) { return (s.spread || 0) > best ? (s.spread || 0) : best; }, 0);
  const withVolume = items.filter(function(s) { return s.totalSales > 0; });
  const totalVol = withVolume.reduce(function(a, s) { return a + s.totalSales; }, 0);

  document.getElementById("stats-area").innerHTML =
    '<div class="stat-card"><div class="label">Results</div><div class="value">' + count + '</div><div class="sub">sneakers with live pricing</div></div>' +
    '<div class="stat-card"><div class="label">Avg Lowest Ask</div><div class="value">$' + avgAsk.toLocaleString() + '</div><div class="sub">current market average</div></div>' +
    '<div class="stat-card"><div class="label">Best Spread</div><div class="value green">+$' + Math.round(bestSpread).toLocaleString() + '</div><div class="sub">highest profit potential</div></div>' +
    '<div class="stat-card"><div class="label">Total Volume</div><div class="value">' + totalVol.toLocaleString() + '</div><div class="sub">total verified sales</div></div>';
}

// --- Render Table ---
function renderTable(items, title) {
  if (!items.length) {
    document.getElementById("table-area").innerHTML = '<div class="error-msg">No results found. Try a different search term.</div>';
    return;
  }

  var rows = "";
  for (var i = 0; i < items.length; i++) {
    var p = items[i];
    var imgHtml = p.thumbnail ? '<img class="shoe-img" src="' + escAttr(p.thumbnail) + '" alt="" onerror="this.style.display=\'none\'">' : '<div class="shoe-img"></div>';
    var retailStr = p.retail ? "$" + p.retail.toLocaleString() : "-";
    var askStr = p.lowestAsk ? "$" + p.lowestAsk.toLocaleString() : "-";
    var bidStr = p.highestBid ? "$" + p.highestBid.toLocaleString() : "-";
    var lastStr = p.lastSale ? "$" + p.lastSale.toLocaleString() : "-";
    var spreadStr = "-";
    var spreadClass = "";
    if (p.spread !== null && p.spread !== undefined) {
      if (p.spread >= 0) {
        spreadStr = "+$" + Math.round(p.spread).toLocaleString() + " (+" + p.spreadPct + "%)";
        spreadClass = "spread-pos";
      } else {
        spreadStr = "-$" + Math.abs(Math.round(p.spread)).toLocaleString() + " (" + p.spreadPct + "%)";
        spreadClass = "spread-neg";
      }
    }
    var volStr = p.totalSales ? p.totalSales.toLocaleString() : "-";

    rows += '<tr onclick="openDetail(' + i + ')">' +
      '<td><div class="shoe-cell">' + imgHtml + '<div><div class="shoe-name">' + escHtml(p.name) + '</div><div class="shoe-meta">' + escHtml(p.brand) + (p.styleID ? " &middot; " + escHtml(p.styleID) : "") + '</div></div></div></td>' +
      '<td class="price">' + retailStr + '</td>' +
      '<td class="price" style="color:#6c5ce7">' + askStr + '</td>' +
      '<td class="price">' + bidStr + '</td>' +
      '<td class="price">' + lastStr + '</td>' +
      '<td class="' + spreadClass + '">' + spreadStr + '</td>' +
      '<td><span class="vol-badge">' + volStr + '</span></td>' +
      '</tr>';
  }

  document.getElementById("table-area").innerHTML =
    '<div class="table-section">' +
    '<div class="table-header"><h3>' + title + '</h3><span class="count">' + items.length + ' sneakers</span></div>' +
    '<div style="overflow-x:auto"><table class="data-table">' +
    '<thead><tr>' +
    '<th onclick="sortTable(\'name\')">Sneaker</th>' +
    '<th onclick="sortTable(\'retail\')">Retail</th>' +
    '<th onclick="sortTable(\'lowestAsk\')">Lowest Ask</th>' +
    '<th onclick="sortTable(\'highestBid\')">Highest Bid</th>' +
    '<th onclick="sortTable(\'lastSale\')">Last Sale</th>' +
    '<th onclick="sortTable(\'spread\')">Spread</th>' +
    '<th onclick="sortTable(\'totalSales\')">Volume</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div></div>';
}

// --- Sort Table ---
function sortTable(col) {
  if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
  currentData.sort(function(a, b) {
    var va = a[col], vb = b[col];
    if (va === null || va === undefined) va = col === "name" ? "" : -Infinity;
    if (vb === null || vb === undefined) vb = col === "name" ? "" : -Infinity;
    if (typeof va === "string") return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
  renderTable(currentData, document.querySelector(".table-header h3") ? document.querySelector(".table-header h3").textContent : "Results");
}

// --- Detail Panel ---
function openDetail(index) {
  var p = currentData[index];
  if (!p) return;

  var retailVal = p.retail || 0;
  var askVal = p.lowestAsk || 0;

  var imgHtml = p.image || p.thumbnail ? '<img class="detail-img" src="' + escAttr(p.image || p.thumbnail) + '" alt="" onerror="this.style.display=\'none\'">' : '';

  var html = imgHtml +
    '<div class="detail-body">' +
    '<h2>' + escHtml(p.name) + '</h2>' +
    '<div class="meta">' + escHtml(p.brand) + (p.colorway ? " &middot; " + escHtml(p.colorway) : "") + (p.styleID ? " &middot; " + escHtml(p.styleID) : "") + '</div>' +
    '<div class="price-grid">' +
    '<div class="price-box"><div class="plabel">Retail</div><div class="pval">' + (p.retail ? "$" + p.retail.toLocaleString() : "-") + '</div></div>' +
    '<div class="price-box"><div class="plabel">Lowest Ask</div><div class="pval ask">' + (p.lowestAsk ? "$" + p.lowestAsk.toLocaleString() : "-") + '</div></div>' +
    '<div class="price-box"><div class="plabel">Last Sale</div><div class="pval">' + (p.lastSale ? "$" + p.lastSale.toLocaleString() : "-") + '</div></div>' +
    '</div>' +
    '<div class="calc-section">' +
    '<h4>Profit Calculator</h4>' +
    '<div class="calc-row"><label>Buy Price</label><input type="number" id="calc-buy" value="' + retailVal + '" onchange="calcProfit()" oninput="calcProfit()"></div>' +
    '<div class="calc-row"><label>Sell Price</label><input type="number" id="calc-sell" value="' + askVal + '" onchange="calcProfit()" oninput="calcProfit()"></div>' +
    '<div id="calc-results"></div>' +
    '</div>';

  if (p.url) {
    html += '<a class="link-btn" href="' + escAttr(p.url) + '" target="_blank" rel="noopener">View on StockX &rarr;</a>';
  }

  html += '</div>';

  document.getElementById("detail-content").innerHTML = html;
  document.getElementById("detail-panel").classList.add("open");
  setTimeout(calcProfit, 50);
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
}

// --- Profit Calculator ---
async function calcProfit() {
  var buy = parseFloat(document.getElementById("calc-buy").value) || 0;
  var sell = parseFloat(document.getElementById("calc-sell").value) || 0;
  if (buy <= 0 || sell <= 0) {
    document.getElementById("calc-results").innerHTML = '<div style="color:#636e72;font-size:13px;padding:10px">Enter buy and sell prices above</div>';
    return;
  }

  try {
    var r = await fetch(API + "/api/profit?sell=" + sell + "&buy=" + buy);
    var d = await r.json();
    var all = d.allMarketplaces;

    var html = '<div class="mp-compare">';
    var marketplaces = ["stockx", "goat", "ebay"];
    for (var i = 0; i < marketplaces.length; i++) {
      var mp = marketplaces[i];
      var data = all[mp];
      if (!data) continue;
      var profitClass = data.netProfit >= 0 ? "profit-pos" : "profit-neg";
      var sign = data.netProfit >= 0 ? "+$" : "-$";
      html += '<div class="mp-card">' +
        '<div class="mp-name">' + escHtml(data.marketplace) + '</div>' +
        '<div class="mp-profit ' + profitClass + '">' + sign + Math.abs(data.netProfit).toFixed(2) + '</div>' +
        '<div class="mp-roi">ROI: ' + data.roi + '% | Fees: $' + data.totalFees.toFixed(2) + '</div>' +
        '</div>';
    }
    html += '</div>';

    // Detailed breakdown for StockX (most popular)
    var sx = all.stockx;
    if (sx) {
      html += '<div class="calc-results" style="margin-top:16px">' +
        '<div style="font-size:12px;font-weight:600;color:#636e72;margin-bottom:8px">StockX Fee Breakdown</div>' +
        '<div class="calc-line"><span>Sell Price</span><span>$' + sx.sellPrice.toFixed(2) + '</span></div>' +
        '<div class="calc-line"><span>Seller Fee (9.5%)</span><span>-$' + sx.feeBreakdown.sellerFee.toFixed(2) + '</span></div>' +
        '<div class="calc-line"><span>Payment Processing (3%)</span><span>-$' + sx.feeBreakdown.paymentProcessing.toFixed(2) + '</span></div>' +
        '<div class="calc-line"><span>Shipping</span><span>-$' + sx.feeBreakdown.shipping.toFixed(2) + '</span></div>' +
        '<div class="calc-line"><span>Your Payout</span><span>$' + sx.payout.toFixed(2) + '</span></div>' +
        '<div class="calc-line"><span>Your Cost (Buy Price)</span><span>-$' + sx.buyPrice.toFixed(2) + '</span></div>';
      var profitClass2 = sx.netProfit >= 0 ? "profit-pos" : "profit-neg";
      html += '<div class="calc-line total"><span>Net Profit</span><span class="' + profitClass2 + '">$' + sx.netProfit.toFixed(2) + ' (' + sx.roi + '% ROI)</span></div></div>';
    }

    document.getElementById("calc-results").innerHTML = html;
  } catch(e) {
    document.getElementById("calc-results").innerHTML = '<div style="color:#d63031;font-size:13px">Calculation failed</div>';
  }
}

// --- Utilities ---
function updateTime() {
  document.getElementById("update-time").textContent = "Updated " + new Date().toLocaleTimeString();
}

function escHtml(s) {
  if (!s) return "";
  var div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

function escAttr(s) {
  if (!s) return "";
  return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// --- Start ---
init();
</script>
